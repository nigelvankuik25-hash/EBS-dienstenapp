<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS DienstApp</title>
</head>
<body>

<h1>EBS DienstApp</h1>

<input id="dienstnummer" placeholder="Voer dienstnummer in">
<button onclick="zoekDienst()">Zoek</button>

<div id="resultaat"></div>

<script>
const diensten = {
  "4001": {
    start: "04:34",
    einde: "12:25"
  },
  "5001": {
    start: "05:35",
    einde: "11:51"
  },
  "6015": {
    start: "07:02",
    einde: "15:50"
  }
};

function zoekDienst() {
  const nummer =
    document.getElementById("dienstnummer").value;

  const dienst = diensten[nummer];

  if (dienst) {
    document.getElementById("resultaat").innerHTML =
      "<h2>Dienst " + nummer + "</h2>" +
      "<p>Start: " + dienst.start + "</p>" +
      "<p>Einde: " + dienst.einde + "</p>";
  } else {
    document.getElementById("resultaat").innerHTML =
      "<p>Dienst niet gevonden</p>";
  }
}
</script>

</body>
</html>
