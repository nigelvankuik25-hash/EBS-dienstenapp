<!DOCTYPE html><html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS DienstApp</title><style>
body{
    font-family:Arial,sans-serif;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

input,button{
    padding:10px;
    font-size:16px;
}

button{
    cursor:pointer;
}

.card{
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    font-size:14px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:left;
}

th{
    background:#f2f2f2;
}

.pauze{
    background:#fff8dc;
}

.mat{
    background:#eef6ff;
}

.overdracht{
    background:#f3f3f3;
}
</style></head>
<body><h1>🚍 EBS DienstApp</h1><input id="dienstnummer" placeholder="Bijv. 4001">
<button onclick="zoekDienst()">Zoek</button><div id="resultaat"></div><script>

let diensten = {};

async function laadDiensten() {

    try{
        const response = await fetch("diensten.json");
        diensten = await response.json();
        console.log("Diensten geladen");
    }catch(error){
        console.error(error);
    }

}

laadDiensten();

function berekenMinuten(start,einde){

    const [sh,sm] = start.split(":").map(Number);
    const [eh,em] = einde.split(":").map(Number);

    return (eh * 60 + em) - (sh * 60 + sm);
}

function zoekDienst(){

    const nummer =
        document.getElementById("dienstnummer").value.trim();

    const dienst = diensten[nummer];

    if(!dienst){

        document.getElementById("resultaat").innerHTML =
        `
        <div class="card">
            <h2>Dienst niet gevonden</h2>
        </div>
        `;

        return;
    }

    let activiteitenHtml = "";

    if(dienst.activiteiten){

        activiteitenHtml =
        `
        <h3>📋 Dienstverloop</h3>

        <table>

            <tr>
                <th>Type</th>
                <th>Lijn</th>
                <th>Omloop</th>
                <th>Ritnr</th>
                <th>Voertuig</th>
                <th>Vertrek</th>
                <th>Van</th>
                <th>Naar</th>
                <th>Aankomst</th>
                <th>Duur</th>
                <th>Opmerking</th>
            </tr>

            ${dienst.activiteiten.map(a => {

                let css = "";

                if(a.type === "pauze"){
                    css = "pauze";
                }

                if(a.type === "mat"){
                    css = "mat";
                }

                if(
                    a.type === "overname" ||
                    a.type === "afgifte"
                ){
                    css = "overdracht";
                }

                return `
                <tr class="${css}">
                    <td>${a.type || ""}</td>
                    <td>${a.lijn || ""}</td>
                    <td>${a.omloop || ""}</td>
                    <td>${a.ritnr || ""}</td>
                    <td>${a.voertuig || ""}</td>
                    <td>${a.vertrek || ""}</td>
                    <td>${a.van || ""}</td>
                    <td>${a.naar || ""}</td>
                    <td>${a.aankomst || ""}</td>
                    <td>${
                        a.vertrek && a.aankomst
                        ? berekenMinuten(a.vertrek,a.aankomst) + " min"
                        : ""
                    }</td>
                    <td>${a.opmerking || ""}</td>
                </tr>
                `;
            }).join("")}

        </table>
        `;
    }

    const totaalMinuten =
        berekenMinuten(dienst.start,dienst.einde);

    document.getElementById("resultaat").innerHTML =
    `
    <div class="card">

        <h2>Dienst ${nummer}</h2>

        <p><b>⏰ Start:</b> ${dienst.start}</p>

        <p><b>🏁 Einde:</b> ${dienst.einde}</p>

        <p>
            <b>⏱️ Dienstduur:</b>
            ${Math.floor(totaalMinuten / 60)}u
            ${totaalMinuten % 60}m
        </p>

        <p>
            <b>🔋 Startvoertuig:</b>
            ${dienst.startVoertuig || "-"}
        </p>

        <p>
            <b>🚗 Podwagen nodig:</b>
            ${dienst.podwagen ? "Ja" : "Nee"}
        </p>

        ${activiteitenHtml}

    </div>
    `;
}

</script></body>
</html>
