<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS DienstApp</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

input,button{
    padding:10px;
    font-size:16px;
}

.card{
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:left;
}

th{
    background:#f2f2f2;
}

.tekst{
    font-weight:bold;
    margin:8px 0;
}

.pauze{
    background:#fff4cc;
}

.mat{
    background:#eef6ff;
}

.stekkeren{
    background:#f5f5f5;
}

.opstap{
    background:#e8ffe8;
}

.afstap{
    background:#ffe8e8;
}
</style>
</head>

<body>

<h1>🚌 EBS DienstApp</h1>

<input id="dienstnummer" placeholder="Bijv. 4001">
<button onclick="zoekDienst()">Zoek</button>

<div id="resultaat"></div>

<script>

let diensten = {};

async function laadDiensten(){
    const response = await fetch("diensten.json");
    diensten = await response.json();
}

laadDiensten();

function berekenMinuten(start,einde){

    const [sh,sm] = start.split(":").map(Number);
    const [eh,em] = einde.split(":").map(Number);

    return (eh*60+em) - (sh*60+sm);
}

function zoekDienst(){

    const nummer =
        document.getElementById("dienstnummer").value;

    const dienst = diensten[nummer];

    if(!dienst){

        document.getElementById("resultaat").innerHTML =
        "<div class='card'>Dienst niet gevonden</div>";

        return;
    }

    let activiteitenHtml = "";

    if(dienst.activiteiten){

        activiteitenHtml += `
        <h3>Activiteiten</h3>

        <table>
        <tr>
            <th>Type</th>
            <th>Lijn</th>
            <th>Omloop</th>
            <th>Ritnr</th>
            <th>Van</th>
            <th>Naar</th>
            <th>Vertrek</th>
            <th>Aankomst</th>
        </tr>
        `;

        dienst.activiteiten.forEach(a => {

            if(a.type === "tekst"){

                activiteitenHtml += `
                <tr>
                    <td colspan="8">
                        <b>${a.omschrijving}</b>
                    </td>
                </tr>
                `;
            }

            else{

                let css = "";

                if(a.type==="pauze") css="pauze";
                if(a.type==="mat") css="mat";
                if(a.type==="stekkeren") css="stekkeren";
                if(a.type==="opstaptijd") css="opstap";
                if(a.type==="afstaptijd") css="afstap";

                activiteitenHtml += `
                <tr class="${css}">
                    <td>${a.type || ""}</td>
                    <td>${a.lijn || ""}</td>
                    <td>${a.omloop || ""}</td>
                    <td>${a.ritnummer || ""}</td>
                    <td>${a.van || ""}</td>
                    <td>${a.naar || ""}</td>
                    <td>${a.vertrek || a.van || ""}</td>
                    <td>${a.aankomst || a.naar || ""}</td>
                </tr>
                `;
            }

        });

        activiteitenHtml += "</table>";
    }

    document.getElementById("resultaat").innerHTML = `

    <div class="card">

        <h2>Dienst ${nummer}</h2>

        <p>⏰ <b>Start:</b> ${dienst.start}</p>

        <p>🏁 <b>Einde:</b> ${dienst.einde}</p>

        <p>
        ⏱️ <b>Dienstduur:</b>
        ${Math.floor(
            berekenMinuten(dienst.start,dienst.einde)/60
        )}u
        ${berekenMinuten(
            dienst.start,dienst.einde
        )%60}m
        </p>

        ${activiteitenHtml}

    </div>

    `;
}

</script>

</body>
</html>
