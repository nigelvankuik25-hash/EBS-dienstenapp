<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS DienstApp</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:600px;
  margin:auto;
  padding:20px;
}
input,button{
  padding:10px;
  font-size:16px;
}
.card{
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-top:20px;
}
</style>

</head>
<body>

<h1>🚍 EBS DienstApp</h1>

<input id="dienstnummer" placeholder="Bijv. 4001">
<button onclick="zoekDienst()">Zoek</button>

<div id="resultaat"></div>

<script>

let diensten = {};

async function laadDiensten() {
    const response = await fetch("diensten.json");
    diensten = await response.json();
}

laadDiensten();
function berekenMinuten(start, einde) {

    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = einde.split(":").map(Number);

    const startMin = sh * 60 + sm;
    const eindMin = eh * 60 + em;

    return eindMin - startMin;
  function berekenMinuten(start, einde){

    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = einde.split(":").map(Number);

    return (eh * 60 + em) - (sh * 60 + sm);
}
}
function zoekDienst() {

    const nummer =
      document.getElementById("dienstnummer").value;

    const dienst = diensten[nummer];

    if(dienst){

    let pauzesHtml = "";
    let lijnenHtml = "";
    let rittenHtml = "";
if (dienst.ritten) {

    rittenHtml =
    "<h3>🚌 Ritten</h3>" +
    "<table border='1' style='width:100%;border-collapse:collapse'>" +
    "<tr>" +
    "<th>Lijn</th>" +
    "<th>Omloop</th>" +
    "<th>Van</th>" +
    "<th>Naar</th>" +
    "<th>Vertrek</th>" +
    "<th>Aankomst</th>" +
    "<th>Duur</th>" +
    "</tr>" +

    dienst.ritten.map(r => `
        <tr>
            <td>${r.lijn}</td>
            <td>${r.omloop || "-"}</td>
            <td>${r.van || "-"}</td>
            <td>${r.naar || "-"}</td>
            <td>${r.vertrek}</td>
            <td>${r.aankomst}</td>
            <td>${berekenMinuten(r.vertrek, r.aankomst)} min</td>
        </tr>
    `).join("") +

    "</table>";
}
      }
    if(dienst.pauzes){
        pauzesHtml =
        "<h3>Pauzes</h3><ul>" +
        dienst.pauzes.map(p => `<li>${p}</li>`).join("") +
        "</ul>";
    }

    if(dienst.lijnen){
        lijnenHtml =
        "<h3>Lijnen</h3><ul>" +
        dienst.lijnen.map(l => `<li>${l}</li>`).join("") +
        "</ul>";
    }

    document.getElementById("resultaat").innerHTML =
    `
    <div class="card">
        <h2>Dienst ${nummer}</h2>

        <p>⏰ <b>Start:</b> ${dienst.start}</p>
<p>🏁 <b>Einde:</b> ${dienst.einde}</p>
<p>⏱️ <b>Dienstduur:</b>
${Math.floor(berekenMinuten(dienst.start, dienst.einde) / 60)}u
${berekenMinuten(dienst.start, dienst.einde) % 60}m
</p>
<p>🔋 <b>Startvoertuig:</b> ${dienst.startVoertuig || dienst.voertuig}</p>


<p>🚗 <b>Podwagen nodig:</b>
${dienst.podwagen ? "Ja" : "Nee"}
</p>

${pauzesHtml}
${lijnenHtml}
${rittenHtml}

    </div>
    `;

    }else{

        document.getElementById("resultaat").innerHTML =
        `
        <div class="card">
            Dienst niet gevonden
        </div>
        `;

    }
}

</script>

</body>
</html>
