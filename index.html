<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS DienstApp</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:600px;
  margin:auto;
  padding:20px;
}
input,button{
  padding:10px;
  font-size:16px;
}
.card{
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-top:20px;
}
</style>

</head>
<body>

<h1>🚍 EBS DienstApp</h1>

<input id="dienstnummer" placeholder="Bijv. 4001">
<button onclick="zoekDienst()">Zoek</button>

<div id="resultaat"></div>

<script>

let diensten = {};

async function laadDiensten() {
    const response = await fetch("diensten.json");
    diensten = await response.json();
}

laadDiensten();

function zoekDienst() {

    const nummer =
      document.getElementById("dienstnummer").value;

    const dienst = diensten[nummer];

    if(dienst){

    let pauzesHtml = "";
    let lijnenHtml = "";

    if(dienst.pauzes){
        pauzesHtml =
        "<h3>Pauzes</h3><ul>" +
        dienst.pauzes.map(p => `<li>${p}</li>`).join("") +
        "</ul>";
    }

    if(dienst.lijnen){
        lijnenHtml =
        "<h3>Lijnen</h3><ul>" +
        dienst.lijnen.map(l => `<li>${l}</li>`).join("") +
        "</ul>";
    }

    document.getElementById("resultaat").innerHTML =
    `
    <div class="card">
        <h2>Dienst ${nummer}</h2>

        <p><b>Start:</b> ${dienst.start}</p>
        <p><b>Einde:</b> ${dienst.einde}</p>

        ${pauzesHtml}
        ${lijnenHtml}

    </div>
    `;

    }else{

        document.getElementById("resultaat").innerHTML =
        `
        <div class="card">
            Dienst niet gevonden
        </div>
        `;

    }
}

</script>

</body>
</html>
